name: "publish"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "*.*.*. Without a 'v'"
        required: true
        type: string
      prerelease:
        description: "Publish this release as a pre-release"
        default: false
        type: boolean

run-name: Build release v${{ inputs.version }}

jobs:
  build_linux:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install required libs # We want Ninja and OpenGL libs
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libglu1-mesa-dev freeglut3-dev mesa-common-dev

      - uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Build (cmake)
        uses: lukka/run-cmake@v10
        with:
          configurePreset: "default"
          # configurePresetAdditionalArgs: "['-DCMAKE_BUILD_TYPE=Release']"
          # buildPreset: "default"
          # buildPresetAdditionalArgs: "['--config Release']"
          # testPreset: "default"
          # testPresetAdditionalArgs: "['--config Release']"

      - name: List build dir
        run: |
          cd build
          ls
          cd lin_x64
          ls

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-linux
          retention-days: 2
          path: |
            build/lin_x64/UniFly-XPLM.xpl

  build_macos:
    runs-on: "macos-latest"
    if: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          arch -x86_64 cmake -B build_x86_64 -DCMAKE_BUILD_TYPE=Release --preset=mac-x86_64
          arch -x86_64 cmake --build build_x86_64
          arch -arm64 cmake -B build_arm64 -DCMAKE_BUILD_TYPE=Release --preset=mac-arm64
          arch -arm64 cmake --build build_arm64
          lipo -create build_x86_64/UniFly-XPLM.xpl build_arm64/UniFly-XPLM.xpl -output UniFly-XPLM.xpl

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-macos
          retention-days: 2
          path: |
            UniFly-XPLM.xpl

  build_windows:
    runs-on: "windows-latest"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Build (cmake)
        uses: lukka/run-cmake@v10
        with:
          configurePreset: "default"
          # configurePresetAdditionalArgs: "['-DCMAKE_BUILD_TYPE=Release']"

          buildPreset: "default"
          buildPresetAdditionalArgs: "['--config Release']"

          testPreset: "default"
          testPresetAdditionalArgs: "['--config Release']"

      - name: List build dir
        run: |
          cd build
          ls
          cd win_x64
          ls

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-windows
          retention-days: 2
          path: |
            build/win_x64/UniFly-XPLM.xpl
            build/win_x64/UniFly-XPLM.pdb
            build/win_x64/abseil_dll.dll
            build/win_x64/libprotobuf.dll

  publish:
    needs: [build_windows, build_linux]
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Bundle
        run: |
          ls -R artifacts
          mkdir -p UniFly-XPLM/lin_x64 UniFly-XPLM/mac_x64 UniFly-XPLM/win_x64
          mv artifacts/build-linux/UniFly-XPLM.xpl UniFly-XPLM/lin_x64/UniFly-XPLM.xpl
          mv artifacts/build-macos/UniFly-XPLM.xpl UniFly-XPLM/mac_x64/UniFly-XPLM.xpl
          mv artifacts/build-windows/UniFly-XPLM.xpl UniFly-XPLM/win_x64/UniFly-XPLM.xpl
          mv artifacts/build-windows/UniFly-XPLM.pdb UniFly-XPLM/win_x64/UniFly-XPLM.pdb
          mv artifacts/build-windows/abseil_dll.dll UniFly-XPLM/win_x64/abseil_dll.dll
          mv artifacts/build-windows/libprotobuf.dll UniFly-XPLM/win_x64/libprotobuf.dll
          echo "v${{ inputs.version }}" > UniFly-XPLM/version.txt

      - name: Compress UniFly.app
        run: |
          zip -r UniFly-XPLM-v${{ inputs.version }}.zip UniFly-XPLM

      - name: Upload release
        id: upload-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ inputs.prerelease }}
          tag_name: v${{ inputs.version }}
          files: |
            UniFly-XPLM-v${{ inputs.version }}.zip
